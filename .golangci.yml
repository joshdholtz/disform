version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - bodyclose
    - noctx
    - unconvert
    - misspell
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/joshholtz/disform

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
